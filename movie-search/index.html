<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieSearch | Find Any Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-gradient">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-film me-2"></i>
                MovieSearch
            </span>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-light" id="popularBtn">
                    <i class="fas fa-fire me-1"></i> Popular
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Search Any Movie</h1>
            <p class="lead">Find movies, TV shows, and more</p>
            
            <div class="search-container">
                <div class="input-group input-group-lg">
                    <input type="text" class="form-control search-input" id="searchInput" 
                           placeholder="Search by movie title... (e.g., Inception, Avatar, Titanic)">
                    <button class="btn btn-search" id="searchBtn">
                        <i class="fas fa-search me-2"></i> Search
                    </button>
                </div>
                <div class="mt-3">
                    <button class="btn-filter" data-type="movie">🎬 Movies</button>
                    <button class="btn-filter" data-type="series">📺 TV Series</button>
                    <button class="btn-filter" data-type="episode">📽️ Episodes</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Results -->
    <div class="container mt-4 mb-5">
        <div id="loadingSpinner" class="text-center py-5" style="display: none;">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-2">Searching for movies...</p>
        </div>

        <div id="resultsHeader" class="results-header">
            <h3 id="resultsTitle">Search for a movie above</h3>
            <span id="resultsCount"></span>
        </div>

        <div class="movies-grid" id="moviesGrid">
            <div class="empty-state">
                <i class="fas fa-film"></i>
                <h4>No movies yet</h4>
                <p>Search for your favorite movie above!</p>
            </div>
        </div>

        <div class="text-center mt-4" id="loadMoreContainer" style="display: none;">
            <button class="btn-load-more" id="loadMoreBtn">Load More Results</button>
        </div>
    </div>

    <!-- Movie Modal -->
    <div class="modal fade" id="movieModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Movie Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Movie details will load here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
